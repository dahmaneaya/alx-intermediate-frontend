<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Image Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4">
  <header class="bg-blue-500 text-white p-4">
    <h1 class="text-3xl">Responsive Image Gallery</h1>
  </header>

  <main class="grid grid-cols-1 lg:grid-cols-3 gap-4 mt-4">
    <img src="https://via.placeholder.com/400x300" alt="Gallery 1" class="w-full h-auto rounded-lg">
    <img src="https://via.placeholder.com/400x300" alt="Gallery 2" class="w-full h-auto rounded-lg">
    <img src="https://via.placeholder.com/400x300" alt="Gallery 3" class="w-full h-auto rounded-lg">
    <img src="https://via.placeholder.com/400x300" alt="Gallery 4" class="w-full h-auto rounded-lg">
    <img src="https://via.placeholder.com/400x300" alt="Gallery 5" class="w-full h-auto rounded-lg">
    <img src="https://via.placeholder.com/400x300" alt="Gallery 6" class="w-full h-auto rounded-lg">
  </main>

  <footer class="bg-gray-800 text-white p-4 mt-4">
    <p>&copy; 2024 Gallery Project</p>
  </footer>
</body>
</html>
